name: benzyl-rag

services:
  # The Vector Database Server (Optional when running self-contained embedded mode)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: benzyl-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  # The Local LLM Server (Optional when using embedded Ollama in rag-app)
  ollama:
    image: ollama/ollama:latest
    container_name: benzyl-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama_storage:/root/.ollama:z
    restart: unless-stopped

  # Automated model downloader for external Ollama service
  ollama-init:
    image: ollama/ollama:latest
    container_name: benzyl-rag-ollama-init
    depends_on:
      - ollama
    entrypoint: /bin/sh
    command:
      - "-c"
      - "sleep 5; echo '[Ollama Init] Pulling default model qwen2.5:3b...'; ollama --host http://ollama:11434 pull qwen2.5:3b; echo '[Ollama Init] Model qwen2.5:3b ready.'"

  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: benzyl-rag:latest
    container_name: benzyl-rag-app
    depends_on:
      - qdrant
      - ollama
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
    volumes:
      - ./data:/app/data:z
      - ./.data:/app/.data:z
      - ./outputs:/app/outputs:z
      - ./.mission_state:/app/.mission_state:z
    stdin_open: true
    tty: true