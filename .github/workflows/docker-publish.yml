name: Docker Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OLLAMA_MODEL=qwen2.5:3b
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/benzyl-rag:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/benzyl-rag:latest
            ghcr.io/kaushikmak/benzyl-rag:${{ github.ref_name }}
            ghcr.io/kaushikmak/benzyl-rag:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub Overview Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/benzyl-rag
          readme-filepath: ./DOCKERHUB.md

